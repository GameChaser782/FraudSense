name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'webapp/**'
      - 'export_static.py'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:   # allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify docs bundle exists
        run: |
          test -f docs/index.html
          test -f docs/static/js/main.js
          test -f docs/data/metrics.json
          test -f docs/data/shap_data.json
          test -f docs/data/fraud_rings.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
