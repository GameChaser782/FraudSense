name: Train & Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'configs/**'
      - 'train_all.py'
      - 'export_static.py'
      - 'webapp/**'
      - 'requirements-ci.txt'
  workflow_dispatch:   # allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: venv
          key: venv-${{ runner.os }}-py313-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: venv-${{ runner.os }}-py313-

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip -q
          # CI-safe project dependencies
          pip install -r requirements-ci.txt -q
          # CPU-only PyTorch (no CUDA needed for CI training)
          pip install torch --index-url https://download.pytorch.org/whl/cpu -q
          # PyG + sparse ops for CPU
          TORCH_VER=$(python -c "import torch; print(torch.__version__.split('+')[0])")
          pip install torch-geometric -q
          pip install torch-scatter torch-sparse \
            -f https://data.pyg.org/whl/torch-${TORCH_VER}+cpu.html -q

      - name: Download dataset
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          source venv/bin/activate
          python src/data/download.py

      - name: Train pipeline (CPU — GNN skipped for CI speed)
        run: |
          source venv/bin/activate
          python train_all.py --skip-gnn

      - name: Export static site
        run: |
          source venv/bin/activate
          python export_static.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
